<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Stubborn Romantic — A Manga</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #ccc;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ---- COVER ---- */
    .cover {
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      background: url('images/churchill-portrait.png') center/cover;
      opacity: 0.12;
      filter: contrast(1.4) brightness(0.3);
    }

    .cover-inner {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
    }

    .cover-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #e0ddd6;
    }

    .cover-title {
      font-size: 13px;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: #555;
      margin: 8px 0 6px;
    }

    .cover-sub {
      font-size: 11px;
      color: #333;
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto 36px;
      font-style: italic;
    }

    .cover-btn {
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 14px 40px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .cover-btn:hover { background: #e0ddd6; color: #000; }

    .cover-hint {
      position: absolute;
      bottom: 16px;
      font-size: 9px;
      color: #1a1a1a;
      letter-spacing: 2px;
    }

    /* ---- READER ---- */
    .reader {
      display: none;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    .reader.on {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- PAGE ---- */
    .page-frame {
      width: 92vw;
      max-width: 520px;
      height: 90vh;
      height: 90dvh;
      max-height: 860px;
      background: #0a0a0a;
      border: 1px solid #151515;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: opacity 0.15s ease;
    }

    .page-frame.turning { opacity: 0; }

    .pg-img {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #080808;
      min-height: 0;
    }

    .pg-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.05);
    }

    .pg-bub {
      position: absolute;
      background: #e8e6df;
      color: #111;
      border-radius: 14px;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      max-width: 200px;
      line-height: 1.4;
      box-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    .pg-bub::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 16px;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #e8e6df;
    }

    .pg-bub.top::after {
      bottom: auto;
      top: -7px;
      border-top: none;
      border-bottom: 8px solid #e8e6df;
    }

    .pg-cap {
      flex-shrink: 0;
      padding: 14px 18px;
      background: #0a0a0a;
      border-top: 1px solid #151515;
      font-size: 12.5px;
      line-height: 1.8;
      color: #999;
      text-align: center;
    }

    .pg-cap em {
      color: #ddd;
      font-style: normal;
      font-weight: 600;
    }

    /* ---- TEXT PAGES ---- */
    .pg-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      text-align: center;
    }

    .pg-act {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 6px;
    }

    .pg-ch {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .pg-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 24px;
      font-weight: 700;
      color: #ddd;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .pg-date {
      font-size: 10px;
      color: #444;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .pg-narr {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      line-height: 2.2;
      color: #888;
      max-width: 380px;
    }

    .pg-narr em {
      color: #ddd;
      font-style: normal;
      font-weight: 700;
    }

    .pg-quote {
      border-left: 2px solid #1a1a1a;
      padding-left: 16px;
      text-align: left;
      max-width: 360px;
    }

    .pg-quote-text {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      font-style: italic;
      color: #777;
      line-height: 1.9;
    }

    .pg-quote-text em {
      color: #bbb;
      font-style: normal;
      font-weight: 600;
    }

    .pg-quote-attr {
      font-size: 9px;
      color: #333;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* ---- CLIMAX PAGE ---- */
    .pg-climax {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
      background: radial-gradient(ellipse at center, #0e0800 0%, #000 100%);
    }

    .climax-line {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #2a1a00;
      margin-bottom: 20px;
    }

    .climax-quote {
      font-family: 'Noto Serif JP', serif;
      font-size: 17px;
      line-height: 2.2;
      color: #c8a96e;
      max-width: 360px;
      font-weight: 700;
    }

    .climax-quote em {
      color: #f0d090;
      font-style: normal;
    }

    .climax-attr {
      font-size: 9px;
      color: #333;
      margin-top: 20px;
      letter-spacing: 2px;
    }

    /* ---- ENDING ---- */
    .pg-ending {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .end-rule {
      width: 30px;
      height: 1px;
      background: #1a1a1a;
      margin-bottom: 24px;
    }

    .end-body {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      color: #555;
      line-height: 2.2;
    }

    .end-body em {
      color: #888;
      font-style: normal;
      font-weight: 600;
    }

    .end-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 28px;
      color: #222;
      margin-top: 30px;
      letter-spacing: 6px;
    }

    .end-attr {
      font-size: 9px;
      color: #1a1a1a;
      margin-top: 36px;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 2;
    }

    .pg-num { display: none; }

    /* ---- AUDIO TOGGLE ---- */
    .audio-btn {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 100;
      width: 28px;
      height: 28px;
      border: 1px solid #1a1a1a;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: #333;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .audio-btn:hover { border-color: #444; color: #888; }
    .audio-btn.on { color: #666; border-color: #333; }

    /* ---- NAV ---- */
    .nav-left, .nav-right {
      position: absolute;
      top: 0;
      height: 100%;
      width: 28%;
      z-index: 20;
      cursor: pointer;
    }

    .nav-left { left: 0; }
    .nav-right { right: 0; }

    .nav-bar {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 30;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .nav-bar:hover { opacity: 1; }

    .nav-btn {
      width: 30px;
      height: 30px;
      border: 1px solid #1a1a1a;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: #444;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover { border-color: #444; color: #aaa; }
    .nav-btn.off { opacity: 0.15; pointer-events: none; }

    .nav-ct {
      font-size: 9px;
      color: #222;
      letter-spacing: 3px;
    }

    .nav-ct-mobile { display: none; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 540px) {
      .page-frame {
        width: 100vw;
        max-width: 100vw;
        height: 100vh;
        height: 100dvh;
        max-height: none;
        border: none;
      }

      .pg-img img {
        object-fit: contain;
        background: #080808;
      }

      .pg-cap { padding: 12px 16px; font-size: 12px; }
      .pg-title { font-size: 21px; }
      .pg-narr { font-size: 14px; }
      .pg-text { padding: 28px 20px; }
      .climax-quote { font-size: 15px; }

      .nav-left, .nav-right { width: 50%; }
      .nav-bar { display: none; }

      .nav-ct-mobile {
        display: block;
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        color: #222;
        letter-spacing: 3px;
        z-index: 30;
      }

      .cover-jp { font-size: 48px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>

  <audio id="theme" src="images/theme.mp3" loop preload="auto"></audio>
  <div class="audio-btn" id="audiobtn" onclick="toggleAudio()" title="Toggle music">♪</div>

  <div class="cover" id="cover" onclick="startBook()">
    <div class="cover-bg"></div>
    <div class="cover-inner">
      <div class="cover-jp">不屈</div>
      <div class="cover-title">The Stubborn Romantic</div>
      <div class="cover-sub">May 1940. Five men. Three days. The decision that saved the world.</div>
      <button class="cover-btn">Open Book</button>
    </div>
    <div class="cover-hint">A true story · London, 1940</div>
  </div>

  <div class="reader" id="reader">
    <div class="nav-left" onclick="prev()"></div>
    <div class="nav-right" onclick="next()"></div>
    <div class="page-frame" id="page"></div>
    <div class="nav-bar">
      <div class="nav-btn" id="bp" onclick="prev()">&#9664;</div>
      <div class="nav-ct" id="ct"></div>
      <div class="nav-btn" id="bn" onclick="next()">&#9654;</div>
    </div>
    <div class="nav-ct-mobile" id="ctm"></div>
  </div>

  <script>
    const I = 'images/';
    const pages = [

      // ===== ACT I: THE MAN =====
      { type: 'text', act: 'Act I \u2014 The Man Nobody Wanted', title: 'Prime Minister', date: 'May 10, 1940' },

      { type: 'text', narr: 'Winston Churchill had spent <em>ten years in the wilderness</em>.<br><br>Mocked. Ignored. Called a warmonger.<br><br>While Hitler rebuilt Germany\u2019s army, Churchill warned. And warned. And warned again.<br><br>Nobody listened.' },

      { type: 'img', src: I+'churchill-arrives.png',
        cap: 'May 10, 1940. Churchill arrived at <em>10 Downing Street</em> as Prime Minister. He was 65 years old. He had been waiting for this moment his entire life.' },

      { type: 'text', narr: 'He later wrote:<br><br><em>\u201CI felt as if I were walking with destiny, and that all my past life had been but a preparation for this hour.\u201D</em><br><br>But destiny was not waiting patiently.<br><br>It was on fire.' },

      // ===== ACT II: THE TRAP =====
      { type: 'text', act: 'Act II \u2014 The Trap', ch: 'Chapter 02', title: 'Surrounded', date: 'May 24, 1940' },

      { type: 'img', src: I+'dunkirk-map.png',
        cap: 'France was <em>collapsing</em>. 330,000 British and Allied soldiers were surrounded at Dunkirk, their backs to the sea. The German army closed in from three sides.' },

      { type: 'text', narr: 'In two weeks, Hitler had done what Germany couldn\u2019t do in four years of the Great War.<br><br>France was finished. Italy was about to enter on Germany\u2019s side. The Soviet Union was Hitler\u2019s ally.<br><br>America was asleep.<br><br><em>Britain stood alone.</em>' },

      { type: 'img', src: I+'soldiers-at-dunkirk.png',
        cap: 'The men on the beach had nothing left. No air cover. Dwindling ammunition. Some had been waiting in the water for days. <em>Waiting for something. Anything.</em>' },

      // ===== ACT III: THE ROOM =====
      { type: 'text', act: 'Act III \u2014 The Room', ch: 'Chapter 03', title: 'Five Men', date: 'May 26, 1940' },

      { type: 'img', src: I+'war-cabinet-room.png',
        cap: 'The War Cabinet. <em>Five men</em> in a wood-panelled room. Churchill. Halifax. Chamberlain. Attlee. Greenwood. Outside: the sound of London going about its day, unaware.' },

      { type: 'text', narr: 'Lord Halifax was the Foreign Secretary.<br><br>He was <em>brilliant</em>. Aristocratic. Calm. Reasonable.<br><br>He had the facts on his side.<br><br>And the facts said Britain could not win.' },

      { type: 'img', src: I+'halifax-speaks.png',
        cap: '<em>\u201CMussolini could mediate,\u201D</em> Halifax said, his voice measured and precise. \u201CWe approach him now, before Italy enters the war. We get terms. We preserve the Empire. We save those men on the beach.\u201D',
        bub: { text: 'We must explore terms. This is rational.', top: '12px', left: '12px' } },

      { type: 'text', narr: 'It was not cowardice.<br><br>Halifax genuinely believed that fighting on was <em>suicide</em>.<br><br>France falling. No allies. The army trapped. What plan could Churchill possibly have?<br><br>He was simply being <em>logical</em>.' },

      { type: 'text', ch: 'Chapter 04', title: 'The Refusal' },

      { type: 'img', src: I+'churchill-refuses.png',
        cap: 'Churchill sat in silence for a long moment. Then he leaned forward. <em>\u201CIf this long island story of ours is to end at last, let it end only when each one of us lies choking in his own blood upon the ground.\u201D</em>' },

      { type: 'text', narr: 'Halifax stared at him.<br><br>Chamberlain shifted uncomfortably.<br><br>Churchill continued: if they opened negotiations now, they would never get better terms than if they fought. And once they showed willingness to negotiate, <em>they could never stop</em>.<br><br>Hitler would bleed them dry, piece by piece.' },

      { type: 'text', narr: 'Halifax\u2019s logic was flawless.<br><br>Churchill\u2019s logic was also flawless.<br><br>But they were answering <em>different questions</em>.<br><br>Halifax asked: <em>Can we win?</em><br>Churchill asked: <em>What happens if we don\u2019t try?</em>' },

      { type: 'img', src: I+'cabinet-argument.png',
        cap: 'Three days of argument. Halifax threatened to resign. <em>\u201CYou\u2019re not on speaking terms with reality,\u201D</em> he told Churchill. Churchill refused to yield. The room grew smaller and colder.',
        bub: { text: 'You are not being rational, Winston.', top: '10px', right: '10px' } },

      // ===== ACT IV: THE GAMBLE =====
      { type: 'text', act: 'Act IV \u2014 The Gamble', ch: 'Chapter 05', title: 'The Twenty-Five', date: 'May 28, 1940' },

      { type: 'text', narr: 'Churchill understood something.<br><br>He could not win the argument inside that room.<br><br>Halifax was too logical. Chamberlain was wavering.<br><br>So Churchill did something no one expected.<br><br>He left the room.' },

      { type: 'img', src: I+'ministers-gather.png',
        cap: 'He called a meeting of the full Cabinet \u2014 <em>all twenty-five ministers</em>. Not the inner circle. Everyone. He stood before them without notes, without preparation, without a plan.' },

      { type: 'text', narr: 'He told them the truth.<br><br>Not the sanitized truth. The <em>brutal</em> truth.<br><br>France was gone. The army was trapped. Britain stood alone.<br><br>And then he told them something else.' },

      // ===== THE CLIMAX =====
      { type: 'climax',
        quote: '\u201CI am convinced that every man of you would rise up and tear me down from my place if I were for one moment to contemplate parley or surrender.\u201D<br><br>\u201CIf this long island story of ours is to end at last, let it end only when each one of us lies choking in his own blood upon the ground.\u201D',
        attr: 'Winston Churchill \u2014 to the full Cabinet, May 28, 1940' },

      { type: 'img', src: I+'ministers-cheer.png',
        cap: 'The room erupted. Twenty-five ministers \u2014 many of them strangers to Churchill, many who had doubted him \u2014 <em>leapt to their feet</em>. They cheered. They pounded the table. Some had tears running down their faces.' },

      { type: 'text', narr: 'One minister wrote in his diary that night:<br><br><em>\u201CWinston spoke for twenty minutes. There was no great oration. No careful argument. Just a man speaking from his blood. And the room went mad.\u201D</em>' },

      // ===== ACT V: THE AFTERMATH =====
      { type: 'text', act: 'Act V \u2014 The Aftermath', ch: 'Chapter 06', title: 'The Decision', date: 'May 28, 1940' },

      { type: 'img', src: I+'halifax-concedes.png',
        cap: 'Churchill returned to the War Cabinet. Halifax looked at him. Something had changed. Churchill had done what no argument could do \u2014 he had <em>moved the country</em>. Halifax backed down.' },

      { type: 'text', narr: 'Three days of debate. Resolved not by facts. Not by logic.<br><br>But by one man\u2019s absolute, unshakeable, <em>irrational certainty</em> that Britain would not bow.<br><br>Halifax was right that the odds were impossible.<br><br>Churchill was right that <em>the odds did not matter</em>.' },

      { type: 'img', src: I+'dunkirk-boats.png',
        cap: 'Operation Dynamo. 338,226 soldiers rescued from Dunkirk by an armada of military ships and <em>civilian boats</em>. Fishermen. Ferry captains. Weekend sailors. They all came.',
      },

      { type: 'text', narr: 'The army that Halifax had written off as lost<br>came home.<br><br>The army that became the core<br>of the force that fought back.<br><br>The army that, five years later,<br>stood in a <em>liberated Europe</em>.' },

      // ===== ENDING =====
      { type: 'ending' }
    ];

    let cur = 0;

    function startBook() {
      document.getElementById('cover').style.display = 'none';
      document.getElementById('reader').classList.add('on');
      cur = 0;
      render();
    }

    function render() {
      const el = document.getElementById('page');
      const d = pages[cur];
      let html = '';

      if (d.type === 'img') {
        html += '<div class="pg-img">';
        html += `<img src="${d.src}" alt="">`;
        if (d.bub) {
          const s = Object.entries(d.bub).filter(([k])=>k!=='text'&&k!=='cls').map(([k,v])=>`${k}:${v}`).join(';');
          const cls = d.bub.cls ? ` ${d.bub.cls}` : '';
          html += `<div class="pg-bub${cls}" style="${s}">${d.bub.text}</div>`;
        }
        html += '</div>';
        if (d.cap) html += `<div class="pg-cap">${d.cap}</div>`;
      }

      else if (d.type === 'text') {
        html += '<div class="pg-text">';
        if (d.act) html += `<div class="pg-act">${d.act}</div>`;
        if (d.ch) html += `<div class="pg-ch">${d.ch}</div>`;
        if (d.title) html += `<div class="pg-title">${d.title}</div>`;
        if (d.date) html += `<div class="pg-date">${d.date}</div>`;
        if (d.narr) html += `<div class="pg-narr">${d.narr}</div>`;
        if (d.quote) {
          html += '<div class="pg-quote">';
          html += `<div class="pg-quote-text">${d.quote.text}</div>`;
          if (d.quote.attr) html += `<div class="pg-quote-attr">${d.quote.attr}</div>`;
          html += '</div>';
        }
        html += '</div>';
      }

      else if (d.type === 'climax') {
        html += '<div class="pg-climax">';
        html += '<div class="climax-line">The Speech &nbsp;&mdash;&nbsp; May 28, 1940</div>';
        html += `<div class="climax-quote">${d.quote}</div>`;
        html += `<div class="climax-attr">${d.attr}</div>`;
        html += '</div>';
      }

      else if (d.type === 'ending') {
        html += '<div class="pg-ending">';
        html += '<div class="end-rule"></div>';
        html += '<div class="end-body">Halifax was the <em>logical rationalist</em>.<br>Churchill was the <em>stubborn romantic</em>.<br><br>Logic said the numbers were impossible.<br>The romantic said the numbers were beside the point.<br><br>Historians would later write:<br><em>\u201CHalifax was merely a logical rationalist<br>when the need was for<br>a stubborn, emotional romantic.\u201D</em><br><br>Sometimes the irrational man<br>is the only rational choice.</div>';
        html += '<div class="end-kanji">\u4E0D\u5C48</div>';
        html += '<div class="end-attr">A true story<br>London, May 1940<br>Churchill: Walking With Destiny \u2014 Andrew Roberts</div>';
        html += '</div>';
      }

      el.innerHTML = html;
      updateNav();
    }

    function next() {
      if (cur >= pages.length - 1) return;
      cur++;
      turn();
    }

    function prev() {
      if (cur <= 0) return;
      cur--;
      turn();
    }

    function turn() {
      const el = document.getElementById('page');
      el.classList.add('turning');
      setTimeout(() => { render(); el.classList.remove('turning'); }, 150);
    }

    function updateNav() {
      const label = `${cur + 1} / ${pages.length}`;
      document.getElementById('ct').textContent = label;
      document.getElementById('ctm').textContent = label;
      document.getElementById('bp').className = 'nav-btn' + (cur === 0 ? ' off' : '');
      document.getElementById('bn').className = 'nav-btn' + (cur === pages.length - 1 ? ' off' : '');
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('cover').style.display !== 'none') {
        if (e.key === 'Enter' || e.key === ' ') startBook();
        return;
      }
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      if (e.key === 'ArrowLeft') prev();
    });

    // ---- AUDIO ----
    let audioOn = false;
    const audio = document.getElementById('theme');
    const audiobtn = document.getElementById('audiobtn');
    audio.volume = 0.35;

    function toggleAudio() {
      if (audioOn) {
        audio.pause();
        audioOn = false;
        audiobtn.classList.remove('on');
        audiobtn.textContent = '♪';
      } else {
        audio.play().catch(()=>{});
        audioOn = true;
        audiobtn.classList.add('on');
        audiobtn.textContent = '♫';
      }
    }

    // Auto-start music when book opens
    const _origStart = startBook;
    // patch startBook to also start audio
    document.getElementById('cover').addEventListener('click', () => {
      if (!audioOn) {
        audio.play().catch(()=>{});
        audioOn = true;
        audiobtn.classList.add('on');
        audiobtn.textContent = '♫';
      }
    });

    let tx = 0;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const d = e.changedTouches[0].clientX - tx;
      if (Math.abs(d) > 50) { d < 0 ? next() : prev(); }
    }, { passive: true });
  </script>

</body>
</html>

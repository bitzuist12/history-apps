<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>5th Residence — A Manga</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #ccc; font-family: 'Inter', sans-serif; height: 100vh; height: 100dvh; overflow: hidden; user-select: none; -webkit-user-select: none; }
    .cover { height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
    .cover-bg { position: absolute; inset: 0; background: url('images/mogul-portrait.png') center/cover; opacity: 0.15; filter: contrast(1.3) brightness(0.3); }
    .cover-inner { position: relative; z-index: 2; text-align: center; padding: 0 24px; }
    .cover-jp { font-family: 'Noto Serif JP', serif; font-size: 64px; font-weight: 900; letter-spacing: 12px; color: #e0ddd6; }
    .cover-title { font-size: 13px; letter-spacing: 10px; text-transform: uppercase; color: #555; margin: 8px 0 6px; }
    .cover-sub { font-size: 11px; color: #333; line-height: 1.7; max-width: 360px; margin: 0 auto 36px; font-style: italic; }
    .cover-btn { border: 1px solid #333; background: transparent; color: #888; font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; padding: 14px 40px; cursor: pointer; transition: all 0.3s; }
    .cover-btn:hover { background: #e0ddd6; color: #000; }
    .cover-hint { position: absolute; bottom: 16px; font-size: 9px; color: #1a1a1a; letter-spacing: 2px; }
    .reader { display: none; height: 100vh; height: 100dvh; position: relative; }
    .reader.on { display: flex; align-items: center; justify-content: center; }
    .page-frame { width: 92vw; max-width: 520px; height: 90vh; height: 90dvh; max-height: 860px; background: #0a0a0a; border: 1px solid #151515; display: flex; flex-direction: column; overflow: hidden; transition: opacity 0.15s ease; }
    .page-frame.turning { opacity: 0; }
    .pg-img { flex: 1; overflow: hidden; position: relative; background: #080808; min-height: 0; }
    .pg-img img { width: 100%; height: 100%; object-fit: cover; display: block; filter: contrast(1.05); }
    .pg-cap { flex-shrink: 0; padding: 14px 18px; background: #0a0a0a; border-top: 1px solid #151515; font-size: 12.5px; line-height: 1.8; color: #999; text-align: center; }
    .pg-cap em { color: #ddd; font-style: normal; font-weight: 600; }
    .pg-text { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; text-align: center; }
    .pg-act { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: #333; margin-bottom: 6px; }
    .pg-ch { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    .pg-title { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; color: #ddd; line-height: 1.4; margin-bottom: 8px; }
    .pg-date { font-size: 10px; color: #333; letter-spacing: 2px; }
    .pg-narr { font-family: 'Noto Serif JP', serif; font-size: 15px; line-height: 2.2; color: #888; max-width: 380px; }
    .pg-narr em { color: #ddd; font-style: normal; font-weight: 700; }
    .pg-ending { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
    .end-rule { width: 30px; height: 1px; background: #1a1a1a; margin-bottom: 24px; }
    .end-body { font-family: 'Noto Serif JP', serif; font-size: 14px; color: #555; line-height: 2.2; }
    .end-body em { color: #888; font-style: normal; font-weight: 600; }
    .end-kanji { font-family: 'Noto Serif JP', serif; font-size: 28px; color: #222; margin-top: 30px; letter-spacing: 6px; }
    .end-attr { font-size: 9px; color: #1a1a1a; margin-top: 36px; letter-spacing: 2px; text-transform: uppercase; line-height: 2; }
    .pg-num { display: none; }
    .nav-left, .nav-right { position: absolute; top: 0; height: 100%; width: 28%; z-index: 20; cursor: pointer; }
    .nav-left { left: 0; } .nav-right { right: 0; }
    .nav-bar { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 14px; z-index: 30; opacity: 0.4; transition: opacity 0.3s; }
    .nav-bar:hover { opacity: 1; }
    .nav-btn { width: 30px; height: 30px; border: 1px solid #1a1a1a; border-radius: 50%; background: rgba(0,0,0,0.7); color: #444; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .nav-btn:hover { border-color: #444; color: #aaa; }
    .nav-btn.off { opacity: 0.15; pointer-events: none; }
    .nav-ct { font-size: 9px; color: #222; letter-spacing: 3px; }
    .nav-ct-mobile { display: none; }
    @media (max-width: 540px) {
      .page-frame { width: 100vw; max-width: 100vw; height: 100vh; height: 100dvh; max-height: none; border: none; }
      .pg-img img { object-fit: contain; background: #080808; }
      .pg-cap { padding: 12px 16px; font-size: 12px; }
      .pg-title { font-size: 21px; }
      .pg-narr { font-size: 14px; }
      .pg-text { padding: 28px 20px; }
      .nav-left, .nav-right { width: 50%; }
      .nav-bar { display: none; }
      .nav-ct-mobile { display: block; position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #222; letter-spacing: 3px; z-index: 30; }
      .cover-jp { font-size: 48px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>

  <div class="cover" id="cover" onclick="startBook()">
    <div class="cover-bg"></div>
    <div class="cover-inner">
      <div class="cover-jp">野心</div>
      <div class="cover-title">5th Residence</div>
      <div class="cover-sub">From the invisible middle child in Hai Duong to Vietnam's next real estate mogul</div>
      <button class="cover-btn">Open Book</button>
    </div>
    <div class="cover-hint">A true story</div>
  </div>

  <div class="reader" id="reader">
    <div class="nav-left" onclick="prev()"></div>
    <div class="nav-right" onclick="next()"></div>
    <div class="page-frame" id="page"></div>
    <div class="nav-bar">
      <div class="nav-btn" id="bp" onclick="prev()">&#9664;</div>
      <div class="nav-ct" id="ct"></div>
      <div class="nav-btn" id="bn" onclick="next()">&#9654;</div>
    </div>
    <div class="nav-ct-mobile" id="ctm"></div>
  </div>

  <script>
    const I = 'images/';
    const pages = [

      // ===== ACT I: THE MIDDLE CHILD =====
      { type: 'text', act: 'Act I \u2014 The Middle Child', title: 'Hai Duong', date: 'Vietnam' },

      { type: 'img', src: I+'middle-child.png',
        cap: 'Three children. The eldest gets the authority. The youngest gets the attention. And in the middle \u2014 <em>Ms. Duong</em>. Invisible. Overlooked. Eating quietly while the world revolves around everyone else.' },

      { type: 'text', narr: 'The middle child learns something<br>the others never do.<br><br>Nobody is coming to help you.<br>Nobody is watching.<br><br><em>You have to build it yourself.</em>' },

      { type: 'text', narr: 'She chose her weapon.<br><br>Not connections \u2014 she had none.<br>Not money \u2014 there wasn\u2019t any.<br>Not the family name \u2014<br>that belonged to the firstborn.<br><br>She chose <em>English</em>.' },

      { type: 'img', src: I+'studying-english.png',
        cap: 'Late nights in a small bedroom in Hai Duong. English textbooks. Dictionaries. A world map on the wall. A desk lamp and <em>fierce determination</em>. While the province slept, she studied.' },

      { type: 'text', narr: 'Word by word.<br>Sentence by sentence.<br>Night after night.<br><br>English was her ticket out.<br>Not out of Vietnam \u2014<br>out of <em>being invisible</em>.' },

      // ===== ACT II: THE HUSTLE =====
      { type: 'text', act: 'Act II \u2014 The Hustle', ch: 'Chapter 02', title: 'The Gates' },

      { type: 'img', src: I+'university-gates.png',
        cap: 'She made it. A top university. The girl from Hai Duong walked through the gates carrying nothing but a backpack and <em>everything she\u2019d taught herself</em>.' },

      { type: 'text', narr: 'At university, she didn\u2019t coast.<br><br>She <em>hustled</em>.<br><br>While others socialized,<br>she networked.<br>While others relaxed,<br>she applied for internships.<br><br>The middle child doesn\u2019t wait<br>to be chosen.<br>She <em>chooses herself</em>.' },

      { type: 'text', ch: 'Chapter 03', title: '$15 Million' },

      { type: 'img', src: I+'finance-office.png',
        cap: 'She landed in finance. For an entire year, she managed cash flows for a <em>$15 million revenue business</em>. The youngest person in the room. The most focused.' },

      { type: 'text', narr: 'Fifteen million dollars<br>flowing through spreadsheets<br>under her fingers.<br><br>She learned how money <em>moves</em>.<br>She learned how businesses <em>breathe</em>.<br>She learned what makes<br>a company <em>live or die</em>.' },

      { type: 'img', src: I+'real-estate-study.png',
        cap: 'Then came real estate tax. Blueprints, contracts, property maps, financial models. She was learning the game <em>from the inside</em>. Every document was a lesson. Every deal was a classroom.' },

      { type: 'text', narr: 'Finance taught her the numbers.<br>Real estate taught her the <em>vision</em>.<br><br>And somewhere between<br>the spreadsheets and the blueprints,<br>an idea began to form.' },

      // ===== ACT III: THE VISION =====
      { type: 'text', act: 'Act III \u2014 The Vision', ch: 'Chapter 04', title: '5th Residence' },

      { type: 'text', narr: 'Vietnam\u2019s hospitality was stuck.<br><br>Cheap hotels with no soul.<br>Luxury resorts with no culture.<br><br>She saw the gap.<br>She saw what was <em>missing</em>:<br><br>Modern Vietnamese hospitality.<br>Beautiful. Tasteful. <em>Real.</em>' },

      { type: 'img', src: I+'interior-vision.png',
        cap: 'Her vision: spaces where Vietnamese design meets modern elegance. Bamboo and silk alongside clean minimalism. Lanterns and tropical gardens through floor-to-ceiling glass. <em>Not just rooms \u2014 an experience.</em>' },

      { type: 'img', src: I+'5th-residence.png',
        cap: '<em>5th Residence.</em> A modern Vietnamese hospitality company. Her name on the building. Her taste in every detail. Her vision made real.' },

      { type: 'text', narr: 'She didn\u2019t ask for permission.<br>She didn\u2019t wait for an invitation.<br><br>The middle child<br>who was never given authority<br><em>took it</em>.' },

      // ===== ACT IV: THE MOGUL =====
      { type: 'text', act: 'Act IV \u2014 The Mogul', ch: 'Chapter 05', title: 'The Mogul' },

      { type: 'img', src: I+'mogul-portrait.png',
        cap: 'Ms. Duong. From Hai Duong to the skyline. From the invisible middle child to a <em>real estate mogul</em> in Vietnam. Confident. Ambitious. Unstoppable.' },

      { type: 'text', narr: 'She has <em>taste</em>.<br>She has <em>vision</em>.<br>She has the numbers in her head<br>and the fire in her chest.<br><br>She can see what Vietnam needs<br>before Vietnam knows it needs it.' },

      { type: 'text', narr: 'The eldest got the authority.<br>The youngest got the attention.<br><br>The middle child got<br><em>everything she built herself</em>.' },

      // ===== ENDING =====
      { type: 'ending' }
    ];

    let cur = 0;

    function startBook() {
      document.getElementById('cover').style.display = 'none';
      document.getElementById('reader').classList.add('on');
      cur = 0; render();
    }

    function render() {
      const el = document.getElementById('page');
      const d = pages[cur];
      let html = '';

      if (d.type === 'img') {
        html += '<div class="pg-img">';
        html += `<img src="${d.src}" alt="">`;
        html += '</div>';
        if (d.cap) html += `<div class="pg-cap">${d.cap}</div>`;
      } else if (d.type === 'text') {
        html += '<div class="pg-text">';
        if (d.act) html += `<div class="pg-act">${d.act}</div>`;
        if (d.ch) html += `<div class="pg-ch">${d.ch}</div>`;
        if (d.title) html += `<div class="pg-title">${d.title}</div>`;
        if (d.date) html += `<div class="pg-date">${d.date}</div>`;
        if (d.narr) html += `<div class="pg-narr">${d.narr}</div>`;
        html += '</div>';
      } else if (d.type === 'ending') {
        html += '<div class="pg-ending"><div class="end-rule"></div>';
        html += '<div class="end-body">From a modest dinner table in Hai Duong<br>where nobody looked her way,<br><br>to the skyline of modern Vietnam<br>where <em>everyone</em> looks her way.<br><br>She was never given the spotlight.<br>She <em>built her own</em>.<br><br>This is the power of the middle child.<br>This is the power of <em>Ms. Duong</em>.</div>';
        html += '<div class="end-kanji">\u7D42</div>';
        html += '<div class="end-attr">A true story<br>5th Residence</div></div>';
      }

      el.innerHTML = html;
      updateNav();
    }

    function next() { if (cur >= pages.length - 1) return; cur++; turn(); }
    function prev() { if (cur <= 0) return; cur--; turn(); }
    function turn() { const el = document.getElementById('page'); el.classList.add('turning'); setTimeout(() => { render(); el.classList.remove('turning'); }, 150); }

    function updateNav() {
      const label = `${cur + 1} / ${pages.length}`;
      document.getElementById('ct').textContent = label;
      document.getElementById('ctm').textContent = label;
      document.getElementById('bp').className = 'nav-btn' + (cur === 0 ? ' off' : '');
      document.getElementById('bn').className = 'nav-btn' + (cur === pages.length - 1 ? ' off' : '');
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('cover').style.display !== 'none') { if (e.key === 'Enter' || e.key === ' ') startBook(); return; }
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      if (e.key === 'ArrowLeft') prev();
    });

    let tx = 0;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => { const d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) { d < 0 ? next() : prev(); } }, { passive: true });
  </script>

</body>
</html>
